<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>研究用ページ（ランダム割付）</title>
</head>
<body>

<h1>研究参加ページ</h1>

<p>
研究へのご協力ありがとうございます。<br>
下のボタンを押すと、無作為に研究条件へ割り当てられます。
</p>

<button onclick="randomAssign()">研究を開始する</button>

<script>
function randomAssign() {
  const r = Math.random();

  if (r < 0.5) {
    // INTERVENTION PRE TEST
    window.location.href =
      "https://kadowakiyoichi-bit.github.io/rct-study/intervention.html";
  } else {
    // CONTROL PRE TEST
    window.location.href =
      "https://kadowakiyoichi-bit.github.io/rct-study/control.html";
  }
}
</script>

</body>
</html>
